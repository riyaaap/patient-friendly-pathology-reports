# config for LoRA training Phase A SFT
# using nvidia L4 GPU w/ 24GB, has hard 90% cap on memory usage at all times -- so 21.6GB 
# and using full FP16 base weights (~16GB for 8B params)
# tight memory constraint... so: will do gradient checkpointing + small per-device batch + accumulation 

# per_device_train_batch_size: 1 + gradient_accumulation_steps: 16 → effective batch size 16, keeps activation memory low per step
# gradient_checkpointing: true → trades compute for memory (recomputes activations in backward pass instead of storing them) 
# target_modules limited to attention projections only (not MLP gate/up/down_proj) for Phase A warm-start to keep adapter small/fast 
# r=16, alpha=32 (2x ratio) as a standard, safe start.. avoid overfitting 

base_model: meta-llama/Llama-3.1-8B
output_dir: checkpoints/phase_a_sft

lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
  bias: none
  task_type: CAUSAL_LM

training:
  num_train_epochs: 3
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 16
  learning_rate: 2.0e-4
  lr_scheduler_type: cosine
  warmup_ratio: 0.03
  weight_decay: 0.0
  fp16: true
  gradient_checkpointing: true
  logging_steps: 10
  eval_strategy: steps
  eval_steps: 100
  save_strategy: steps
  save_steps: 100
  save_total_limit: 3
  max_seq_length: 4096
  optim: adamw_torch
